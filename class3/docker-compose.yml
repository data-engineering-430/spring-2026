services:
  nifi:
    image: apache/nifi:2.2.0
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      NIFI_WEB_HTTPS_PORT: "8443"
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: admin1234567890
      NIFI_JVM_HEAP_INIT: 512m
      NIFI_JVM_HEAP_MAX: 1g
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_db:/opt/nifi/nifi-current/database_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
      - ./logs:/opt/nifi/nifi-current/logs
      - ./data:/opt/nifi/nifi-current/data
      - ./scripts:/opt/nifi/nifi-current/scripts
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost:8443/nifi/"]
      interval: 60s
      timeout: 10s
      start_period: 90s
      retries: 5
    restart: unless-stopped

volumes:
  nifi_conf:
  nifi_state:
  nifi_db:
  nifi_content:
  nifi_provenance:
